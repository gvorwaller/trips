# /etc/nginx/sites-available/trips.gaylon.photos
# Reverse proxy trips.gaylon.photos -> 127.0.0.1:3004 (PM2/SvelteKit).
# Cloudflare in front, zone TLS mode Flexible, origin is HTTP-only on :80.
# Matches the sibling apps (gaylonphotos, giftlist, madonnahist, birds).

server {
    listen 80;
    listen [::]:80;
    server_name trips.gaylon.photos;

    # 30 MB attachment uploads + a little headroom. adapter-node's own limit is
    # disabled (BODY_SIZE_LIMIT=Infinity in ecosystem.config.cjs); nginx is the
    # real cap. See gaylonphotos devlog 2026-02-28.
    client_max_body_size 32m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    access_log /var/log/nginx/trips.access.log;
    error_log  /var/log/nginx/trips.error.log;

    # HTTP->HTTPS handled zone-wide by Cloudflare "Always Use HTTPS".

    # Service worker must never be edge/browser-cached, or SW updates can't
    # propagate (offline current-trip cache depends on this).
    location = /service-worker.js {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
